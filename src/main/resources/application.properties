# ============================================================
# Odoo connection — hardcode ต่อบริษัท
# ============================================================
odoo.url=http://192.168.1.100:8069
odoo.db=company_db

# ============================================================
# Claude API — ค่า default fallback (ตั้งค่าจริงผ่านหน้า /settings)
# ============================================================
claude.api-key=${CLAUDE_API_KEY:}
claude.model=claude-haiku-4-5-20251001

# ============================================================
# PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/odoo_ai
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ============================================================
# Session (JDBC)
# ============================================================
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
server.servlet.session.timeout=8h

# ============================================================
# Server
# ============================================================
server.port=8080
spring.application.name=odooai
