<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — Odoo AI</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-wrap">
    <div class="login-card">

        <div class="login-logo">
            <i data-lucide="bot" style="width:28px;height:28px;stroke-width:1.5;stroke:#fff"></i>
        </div>

        <h1>Odoo AI</h1>
        <p>เข้าสู่ระบบด้วยบัญชี Odoo ของคุณ</p>

        <div th:if="${param.error}" class="error-box">
            <i data-lucide="alert-circle" style="width:15px;height:15px;stroke-width:2;flex-shrink:0"></i>
            <span>อีเมลหรือรหัสผ่านไม่ถูกต้อง</span>
        </div>

        <form method="post" action="/login">
            <div class="form-group">
                <label for="username">อีเมล</label>
                <div class="input-wrap">
                    <i data-lucide="mail" class="input-icon"></i>
                    <input type="email" id="username" name="username" placeholder="your@email.com" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <div class="input-wrap">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="remember-row">
                <label class="remember-label">
                    <input type="checkbox" name="remember-me"> จำฉันไว้ 30 วัน
                </label>
            </div>

            <button type="submit">
                <i data-lucide="log-in" style="width:16px;height:16px;stroke-width:2.5"></i>
                เข้าสู่ระบบ
            </button>
        </form>

    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
