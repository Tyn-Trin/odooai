<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo AI Chat</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- Dropdown menu -->
<div class="conv-dropdown" id="conv-dropdown">
    <button onclick="doRename()">
        <i data-lucide="pencil" style="width:14px;height:14px;stroke-width:2;flex-shrink:0"></i>
        เปลี่ยนชื่อ
    </button>
    <button id="fav-btn" onclick="doFavourite()">
        <i data-lucide="star" style="width:14px;height:14px;stroke-width:2;flex-shrink:0"></i>
        <span id="fav-label">เพิ่มในรายการโปรด</span>
    </button>
</div>

<!-- Modal logout -->
<div class="modal-backdrop" id="logout-modal">
    <div class="modal">
        <p class="modal-title">ออกจากระบบ</p>
        <p class="modal-desc">ต้องการออกจากระบบจริงหรือไม่?</p>
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeModal('logout-modal')">ยกเลิก</button>
            <button class="modal-confirm" onclick="window.location.href='/logout'">ออกจากระบบ</button>
        </div>
    </div>
</div>

<!-- Modal delete แชท -->
<div class="modal-backdrop" id="delete-modal">
    <div class="modal">
        <p class="modal-title">ลบบทสนทนา</p>
        <p class="modal-desc">บทสนทนานี้จะถูกลบถาวรออกจากระบบ</p>
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeModal('delete-modal')">ยกเลิก</button>
            <button class="modal-confirm danger" onclick="doDeleteConversation()">ลบ</button>
        </div>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">
            <i data-lucide="bot" style="width:16px;height:16px;stroke-width:2;stroke:#fff"></i>
        </div>
        <span>Odoo AI</span>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
        <i data-lucide="plus" style="width:14px;height:14px;stroke-width:3"></i>
        บทสนทนาใหม่
    </button>

    <div class="conv-list" id="conv-list"></div>

    <div class="sidebar-user">
        <div class="user-avatar" id="user-initials">U</div>
        <div class="user-info">
            <span id="username-display" th:text="${username}">User</span>
            <a href="#" class="logout-link" onclick="openModal('logout-modal')">ออกจากระบบ</a>
        </div>
    </div>
</div>

<div class="main">
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px;">
            <button class="menu-btn" onclick="toggleSidebar()" title="เมนู">
                <i data-lucide="menu" style="width:18px;height:18px;stroke-width:2"></i>
            </button>
            <span class="topbar-title" id="topbar-title">Odoo AI Chat</span>
        </div>
        <a href="/settings" class="settings-btn" title="ตั้งค่า">
            <i data-lucide="settings" style="width:16px;height:16px;stroke-width:2"></i>
        </a>
    </div>

    <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
            <div class="empty-logo">
                <i data-lucide="bot" style="width:28px;height:28px;stroke-width:1.5;stroke:#fff"></i>
            </div>
            <h2>Odoo AI Chat</h2>
            <p>ถามข้อมูลจาก Odoo เป็นภาษาไทยได้เลย<br>ไม่ต้องรู้ชื่อ field หรือ model เลย</p>
            <div class="chips">
                <button class="chip" onclick="fillInput(this)">ลูกหนี้ค้างชำระเกิน 30 วันมีใครบ้าง</button>
                <button class="chip" onclick="fillInput(this)">PO ที่รับสินค้าแล้วแต่ยังไม่ได้วาง bill</button>
                <button class="chip" onclick="fillInput(this)">ยอดขายเดือนนี้เป็นเท่าไร</button>
                <button class="chip" onclick="fillInput(this)">vendor ไหนส่ง bill มาเกินราคา PO</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="question" rows="1"
                placeholder="พิมพ์คำถาม เช่น ลูกหนี้ค้างชำระเกิน 30 วันมีใครบ้าง"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">
                <i data-lucide="send" style="width:15px;height:15px;stroke-width:2.5"></i>
            </button>
        </div>
        <div class="input-hint">Enter เพื่อส่ง &nbsp;·&nbsp; Shift+Enter ขึ้นบรรทัดใหม่</div>
    </div>
</div>

<script>
    lucide.createIcons();
    marked.setOptions({ breaks: true, gfm: true });

    let currentConversationId = null;
    let pendingDeleteId = null;
    let activeMenuId = null;
    let activeMenuFav = false;

    function toggleMenu(e, id, isFav) {
        e.stopPropagation();
        const dropdown = document.getElementById('conv-dropdown');
        const btn = e.currentTarget;
        const rect = btn.getBoundingClientRect();

        if (activeMenuId === id && dropdown.classList.contains('show')) {
            closeDropdown(); return;
        }

        activeMenuId = id;
        activeMenuFav = isFav;
        document.getElementById('fav-label').textContent = isFav ? 'นำออกจากรายการโปรด' : 'เพิ่มในรายการโปรด';

        dropdown.style.top = (rect.bottom + 4) + 'px';
        dropdown.style.left = rect.left + 'px';
        dropdown.classList.add('show');
    }

    function closeDropdown() {
        document.getElementById('conv-dropdown').classList.remove('show');
        activeMenuId = null;
    }

    document.addEventListener('click', () => closeDropdown());

    async function doRename() {
        closeDropdown();
        const row = document.querySelector(`.conv-row[data-id="${activeMenuId}"]`);
        if (!row) return;
        const id = activeMenuId;
        const titleEl = row.querySelector('.conv-title');
        const oldTitle = titleEl.textContent;

        const input = document.createElement('input');
        input.className = 'conv-rename-input';
        input.value = oldTitle;
        titleEl.replaceWith(input);
        input.focus();
        input.select();

        const save = async () => {
            const newTitle = input.value.trim() || oldTitle;
            const span = document.createElement('span');
            span.className = 'conv-title';
            span.textContent = newTitle;
            input.replaceWith(span);
            if (newTitle !== oldTitle) {
                await fetch(`/api/conversations/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle })
                });
                if (currentConversationId === id)
                    document.getElementById('topbar-title').textContent = newTitle;
            }
        };

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); save(); }
            if (e.key === 'Escape') { input.replaceWith(Object.assign(document.createElement('span'), { className: 'conv-title', textContent: oldTitle })); }
        });
        input.addEventListener('blur', save);
    }

    async function doFavourite() {
        const id = activeMenuId;
        const newFav = !activeMenuFav;
        closeDropdown();
        await fetch(`/api/conversations/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ favourite: newFav })
        });
        await loadConversationList();
    }

    function openModal(id) {
        document.getElementById(id).classList.add('show');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    function askDeleteConversation(id) {
        pendingDeleteId = id;
        openModal('delete-modal');
    }

    async function doDeleteConversation() {
        if (!pendingDeleteId) return;
        closeModal('delete-modal');
        await fetch(`/api/conversations/${pendingDeleteId}`, { method: 'DELETE' });
        if (currentConversationId === pendingDeleteId) {
            currentConversationId = null;
            document.getElementById('topbar-title').textContent = 'Odoo AI Chat';
            newChat();
        }
        pendingDeleteId = null;
        await loadConversationList();
    }

    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('open');
        document.getElementById('sidebar-backdrop').classList.toggle('show');
    }

    function closeSidebar() {
        document.querySelector('.sidebar').classList.remove('open');
        document.getElementById('sidebar-backdrop').classList.remove('show');
    }

    // Set user initial
    const nameEl = document.getElementById('username-display');
    const initEl = document.getElementById('user-initials');
    if (nameEl && initEl) {
        initEl.textContent = nameEl.textContent.trim().charAt(0).toUpperCase() || 'U';
    }

    loadConversationList();

    async function loadConversationList() {
        const res = await fetch('/api/conversations');
        const convs = await res.json();
        renderConversationList(convs);
    }

    function renderConversationList(convs) {
        const list = document.getElementById('conv-list');
        if (convs.length === 0) { list.innerHTML = ''; return; }

        const favs   = convs.filter(c => c.favourite);
        const others = convs.filter(c => !c.favourite);

        let html = '';
        if (favs.length > 0) {
            html += `<div class="conv-section-label">รายการโปรด</div>`;
            html += favs.map(c => convRowHtml(c)).join('');
        }
        if (others.length > 0) {
            html += `<div class="conv-section-label">บทสนทนา</div>`;
            html += others.map(c => convRowHtml(c)).join('');
        }
        list.innerHTML = html;
    }

    function convRowHtml(c) {
        return `
        <div class="conv-row ${c.id === currentConversationId ? 'active' : ''}" data-id="${c.id}">
            <button class="conv-item" onclick="loadConversation(${c.id}, this)">
                ${c.favourite
                    ? `<svg class="star-icon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
                    : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`
                }
                <span class="conv-title">${escapeHtml(c.title)}</span>
            </button>
            <button class="conv-menu-btn" onclick="toggleMenu(event, ${c.id}, ${c.favourite})">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
                </svg>
            </button>
            <button class="conv-delete" onclick="askDeleteConversation(${c.id})" title="ลบ">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
                    <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
            </button>
        </div>`;
    }

    async function loadConversation(id, el) {
        currentConversationId = id;
        closeSidebar();
        document.querySelectorAll('.conv-row').forEach(b => b.classList.remove('active'));
        el.closest('.conv-row').classList.add('active');
        document.getElementById('topbar-title').textContent = el.querySelector('span').textContent;

        const res = await fetch(`/api/conversations/${id}/messages`);
        const messages = await res.json();
        const container = document.getElementById('messages');
        container.innerHTML = '';
        messages.forEach(msg => {
            appendMessage(msg.role, msg.role === 'user'
                ? escapeHtml(msg.content)
                : marked.parse(msg.content));
        });
    }

    function fillInput(el) {
        const ta = document.getElementById('question');
        ta.value = el.textContent.trim().replace(/^·\s*/, '');
        autoResize(ta);
        ta.focus();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }

    function newChat() {
        currentConversationId = null;
        document.getElementById('topbar-title').textContent = 'Odoo AI Chat';
        document.querySelectorAll('.conv-row').forEach(b => b.classList.remove('active'));
        document.getElementById('messages').innerHTML = `
            <div class="empty-state" id="empty-state">
                <div class="empty-logo">
                    <i data-lucide="bot" style="width:28px;height:28px;stroke-width:1.5;stroke:#fff"></i>
                </div>
                <h2>Odoo AI Chat</h2>
                <p>ถามข้อมูลจาก Odoo เป็นภาษาไทยได้เลย<br>ไม่ต้องรู้ชื่อ field หรือ model เลย</p>
                <div class="chips">
                    <button class="chip" onclick="fillInput(this)">ลูกหนี้ค้างชำระเกิน 30 วันมีใครบ้าง</button>
                    <button class="chip" onclick="fillInput(this)">PO ที่รับสินค้าแล้วแต่ยังไม่ได้วาง bill</button>
                    <button class="chip" onclick="fillInput(this)">ยอดขายเดือนนี้เป็นเท่าไร</button>
                    <button class="chip" onclick="fillInput(this)">vendor ไหนส่ง bill มาเกินราคา PO</button>
                </div>
            </div>`;
        lucide.createIcons();
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function appendMessage(role, htmlContent) {
        const emptyState = document.getElementById('empty-state');
        if (emptyState) emptyState.remove();

        const wrap = document.createElement('div');
        wrap.className = `msg-wrap ${role}`;

        if (role === 'user') {
            wrap.innerHTML = `<div class="msg-body">${htmlContent}</div>`;
        } else {
            wrap.innerHTML = `
                <div class="msg-label">
                    <span class="label-ai-icon">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    </span>
                    AI
                </div>
                <div class="msg-body markdown">${htmlContent}</div>`;
        }

        document.getElementById('messages').appendChild(wrap);
        wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
        return wrap;
    }

    async function sendMessage() {
        const input = document.getElementById('question');
        const question = input.value.trim();
        if (!question) return;

        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').disabled = true;

        appendMessage('user', escapeHtml(question));

        const aiWrap = appendMessage('assistant',
            '<div class="loading-dots"><span></span><span></span><span></span></div>');
        const msgBody = aiWrap.querySelector('.msg-body');

        try {
            const body = new URLSearchParams({ question });
            if (currentConversationId) body.append('conversationId', currentConversationId);

            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString()
            });
            const data = await res.json();
            msgBody.className = 'msg-body markdown';
            msgBody.innerHTML = marked.parse(data.answer);

            if (!currentConversationId) {
                currentConversationId = data.conversationId;
                await loadConversationList();
                const newItem = document.querySelector(`[data-id="${currentConversationId}"]`);
                if (newItem) {
                    document.querySelectorAll('.conv-row').forEach(b => b.classList.remove('active'));
                    newItem.classList.add('active');
                    document.getElementById('topbar-title').textContent =
                        newItem.querySelector('span').textContent;
                }
            }
        } catch {
            msgBody.className = 'msg-body';
            msgBody.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        }

        document.getElementById('send-btn').disabled = false;
        input.focus();
    }
</script>
</body>
</html>
